<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <rect width="800" height="480" fill="#0d1117"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#58a6ff" font-size="18" font-weight="700">SDL3 Window + GPU Backends</text>

  <!-- SDL3 Window box -->
  <rect x="220" y="60" width="360" height="60" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="700">SDL3 Window</text>
  <text x="400" y="108" text-anchor="middle" fill="#8b949e" font-size="12">Cross-platform window + input + events</text>

  <!-- Arrow down to abstraction -->
  <line x1="400" y1="120" x2="400" y2="160" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Render abstraction layer -->
  <rect x="160" y="160" width="480" height="50" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="400" y="190" text-anchor="middle" fill="#58a6ff" font-size="15" font-weight="600">Draxul Render Abstraction</text>

  <!-- Fork arrows -->
  <line x1="280" y1="210" x2="180" y2="270" stroke="#f0883e" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="520" y1="210" x2="620" y2="270" stroke="#d2a8ff" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Vulkan backend -->
  <rect x="60" y="270" width="260" height="120" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="190" y="300" text-anchor="middle" fill="#f0883e" font-size="16" font-weight="700">Vulkan</text>
  <text x="190" y="322" text-anchor="middle" fill="#8b949e" font-size="12">VkInstance, VkDevice</text>
  <text x="190" y="342" text-anchor="middle" fill="#8b949e" font-size="12">VkSwapchain, VkRenderPass</text>
  <text x="190" y="362" text-anchor="middle" fill="#8b949e" font-size="12">SPIR-V shaders</text>
  <text x="190" y="382" text-anchor="middle" fill="#f0883e" font-size="11" font-weight="600">Windows / Linux</text>

  <!-- Metal backend -->
  <rect x="480" y="270" width="260" height="120" rx="10" fill="#161b22" stroke="#d2a8ff" stroke-width="2"/>
  <text x="610" y="300" text-anchor="middle" fill="#d2a8ff" font-size="16" font-weight="700">Metal</text>
  <text x="610" y="322" text-anchor="middle" fill="#8b949e" font-size="12">MTLDevice, MTLCommandQueue</text>
  <text x="610" y="342" text-anchor="middle" fill="#8b949e" font-size="12">CAMetalLayer, MTLRenderPipeline</text>
  <text x="610" y="362" text-anchor="middle" fill="#8b949e" font-size="12">MSL shaders</text>
  <text x="610" y="382" text-anchor="middle" fill="#d2a8ff" font-size="11" font-weight="600">macOS</text>

  <!-- SDL3 creates surface note -->
  <rect x="280" y="240" width="240" height="30" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="260" text-anchor="middle" fill="#7ee787" font-size="12">SDL3 creates the native surface</text>

  <!-- Bottom summary -->
  <text x="400" y="430" text-anchor="middle" fill="#8b949e" font-size="13">Same codebase, same window — backend selected at build time</text>

  <!-- GPU boxes at bottom -->
  <rect x="120" y="440" width="140" height="30" rx="6" fill="#0d1117" stroke="#f0883e" stroke-width="1"/>
  <text x="190" y="460" text-anchor="middle" fill="#f0883e" font-size="11">GPU (NVIDIA/AMD/Intel)</text>

  <rect x="540" y="440" width="140" height="30" rx="6" fill="#0d1117" stroke="#d2a8ff" stroke-width="1"/>
  <text x="610" y="460" text-anchor="middle" fill="#d2a8ff" font-size="11">GPU (Apple Silicon)</text>

  <!-- Arrows to GPU -->
  <line x1="190" y1="390" x2="190" y2="440" stroke="#f0883e" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="610" y1="390" x2="610" y2="440" stroke="#d2a8ff" stroke-width="1.5" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>
</svg>
