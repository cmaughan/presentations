<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0883e"/>
    </marker>
  </defs>

  <!-- Phase 1: Prompt box -->
  <rect x="310" y="20" width="280" height="55" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
  <text x="450" y="42" text-anchor="middle" fill="#8b949e" font-size="11">PROMPT</text>
  <text x="450" y="60" text-anchor="middle" fill="#c9d1d9" font-size="13" font-weight="600">"Review the codebase..."</text>

  <!-- Arrows from prompt to agents -->
  <line x1="370" y1="75" x2="150" y2="120" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="75" x2="450" y2="120" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="530" y1="75" x2="750" y2="120" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2: Three agents -->
  <!-- Claude -->
  <rect x="50" y="120" width="200" height="70" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="150" y="152" text-anchor="middle" fill="#58a6ff" font-size="17" font-weight="700">Claude</text>
  <text x="150" y="174" text-anchor="middle" fill="#8b949e" font-size="12">claude-code</text>

  <!-- Codex -->
  <rect x="350" y="120" width="200" height="70" rx="10" fill="#161b22" stroke="#7ee787" stroke-width="2"/>
  <text x="450" y="152" text-anchor="middle" fill="#7ee787" font-size="17" font-weight="700">Codex</text>
  <text x="450" y="174" text-anchor="middle" fill="#8b949e" font-size="12">codex-cli</text>

  <!-- Gemini -->
  <rect x="650" y="120" width="200" height="70" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="750" y="152" text-anchor="middle" fill="#f0883e" font-size="17" font-weight="700">Gemini</text>
  <text x="750" y="174" text-anchor="middle" fill="#8b949e" font-size="12">gemini-cli</text>

  <!-- Arrows from agents to review files -->
  <line x1="150" y1="190" x2="150" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="190" x2="450" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="750" y1="190" x2="750" y2="235" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3: Review output files -->
  <!-- Claude review -->
  <rect x="50" y="235" width="200" height="55" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="70" y="258" fill="#58a6ff" font-size="13" font-weight="600">review-latest</text>
  <text x="70" y="278" fill="#8b949e" font-size="12">.claude.md</text>

  <!-- Codex review -->
  <rect x="350" y="235" width="200" height="55" rx="6" fill="#0d1117" stroke="#7ee787" stroke-width="1.5"/>
  <text x="370" y="258" fill="#7ee787" font-size="13" font-weight="600">review-latest</text>
  <text x="370" y="278" fill="#8b949e" font-size="12">.codex.md</text>

  <!-- Gemini review -->
  <rect x="650" y="235" width="200" height="55" rx="6" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="670" y="258" fill="#f0883e" font-size="13" font-weight="600">review-latest</text>
  <text x="670" y="278" fill="#8b949e" font-size="12">.gemini.md</text>

  <!-- Converging arrows to synthesis -->
  <line x1="150" y1="290" x2="380" y2="345" stroke="#f0883e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <line x1="450" y1="290" x2="450" y2="345" stroke="#f0883e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>
  <line x1="750" y1="290" x2="520" y2="345" stroke="#f0883e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-orange)"/>

  <!-- Phase 4: Synthesis agent -->
  <rect x="310" y="345" width="280" height="65" rx="10" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="450" y="373" text-anchor="middle" fill="#f0883e" font-size="16" font-weight="700">Codex (synthesis)</text>
  <text x="450" y="395" text-anchor="middle" fill="#8b949e" font-size="12">"Combine reviews, generate work items"</text>

  <!-- Arrows to outputs -->
  <line x1="400" y1="410" x2="250" y2="450" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="410" x2="650" y2="450" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5: Final outputs -->
  <!-- Consensus -->
  <rect x="100" y="450" width="280" height="50" rx="6" fill="#0d1117" stroke="#7ee787" stroke-width="1.5"/>
  <text x="120" y="472" fill="#7ee787" font-size="13" font-weight="600">review-consensus.md</text>
  <text x="120" y="490" fill="#8b949e" font-size="11">synthesized findings + priorities</text>

  <!-- Work items -->
  <rect x="520" y="450" width="280" height="50" rx="6" fill="#0d1117" stroke="#7ee787" stroke-width="1.5"/>
  <text x="540" y="472" fill="#7ee787" font-size="13" font-weight="600">work-items/*.md</text>
  <text x="540" y="490" fill="#8b949e" font-size="11">actionable specs per issue</text>
</svg>
