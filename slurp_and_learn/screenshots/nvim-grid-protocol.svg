<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="'Inter', 'Helvetica Neue', sans-serif">
  <rect width="800" height="480" fill="#0d1117"/>

  <text x="400" y="36" text-anchor="middle" fill="#f0883e" font-size="18" font-weight="700">msgpack-RPC: It's all about the grid</text>

  <!-- Neovim sends -->
  <rect x="40" y="60" width="200" height="50" rx="8" fill="#161b22" stroke="#f0883e" stroke-width="2"/>
  <text x="140" y="90" text-anchor="middle" fill="#f0883e" font-size="15" font-weight="600">nvim --embed</text>

  <!-- Arrow -->
  <line x1="240" y1="85" x2="310" y2="85" stroke="#58a6ff" stroke-width="2" marker-end="url(#arr)"/>
  <text x="275" y="75" text-anchor="middle" fill="#8b949e" font-size="11">redraw</text>

  <!-- Event list box -->
  <rect x="310" y="55" width="450" height="60" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="535" y="78" text-anchor="middle" fill="#58a6ff" font-size="13" font-weight="600">["redraw", [event, args], [event, args], ...]</text>
  <text x="535" y="100" text-anchor="middle" fill="#8b949e" font-size="12">Batched events per frame, ending with flush</text>

  <!-- Grid visualisation -->
  <rect x="60" y="140" width="680" height="300" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="400" y="168" text-anchor="middle" fill="#7ee787" font-size="16" font-weight="700">Key Grid Events</text>

  <!-- grid_resize -->
  <rect x="90" y="190" width="280" height="50" rx="6" fill="#0d1117" stroke="#7ee787" stroke-width="1.5"/>
  <text x="230" y="212" text-anchor="middle" fill="#7ee787" font-size="14" font-weight="600">grid_resize</text>
  <text x="230" y="230" text-anchor="middle" fill="#8b949e" font-size="12">[grid, width, height]</text>

  <!-- hl_attr_define -->
  <rect x="430" y="190" width="280" height="50" rx="6" fill="#0d1117" stroke="#d2a8ff" stroke-width="1.5"/>
  <text x="570" y="212" text-anchor="middle" fill="#d2a8ff" font-size="14" font-weight="600">hl_attr_define</text>
  <text x="570" y="230" text-anchor="middle" fill="#8b949e" font-size="12">[id, {fg, bg, bold, italic...}]</text>

  <!-- grid_line — the big one -->
  <rect x="90" y="260" width="620" height="60" rx="6" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
  <text x="230" y="285" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">grid_line</text>
  <text x="230" y="305" text-anchor="middle" fill="#8b949e" font-size="12">[grid, row, col_start,</text>
  <text x="530" y="285" text-anchor="middle" fill="#58a6ff" font-size="14" font-weight="600">← the core draw call</text>
  <text x="530" y="305" text-anchor="middle" fill="#8b949e" font-size="12">[[text, hl_id, repeat], ...]]</text>

  <!-- grid_cursor_goto -->
  <rect x="90" y="340" width="280" height="50" rx="6" fill="#0d1117" stroke="#f0883e" stroke-width="1.5"/>
  <text x="230" y="362" text-anchor="middle" fill="#f0883e" font-size="14" font-weight="600">grid_cursor_goto</text>
  <text x="230" y="380" text-anchor="middle" fill="#8b949e" font-size="12">[grid, row, col]</text>

  <!-- flush -->
  <rect x="430" y="340" width="280" height="50" rx="6" fill="#0d1117" stroke="#f85149" stroke-width="1.5"/>
  <text x="570" y="362" text-anchor="middle" fill="#f85149" font-size="14" font-weight="600">flush</text>
  <text x="570" y="380" text-anchor="middle" fill="#8b949e" font-size="12">[] — commit frame to screen</text>

  <!-- Summary text -->
  <text x="400" y="420" text-anchor="middle" fill="#8b949e" font-size="13">Neovim owns the text model — the GUI just paints cells into a grid</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#58a6ff"/>
    </marker>
  </defs>
</svg>
